name: Branch Protection Checklist

on:
  workflow_dispatch:

jobs:
  checklist:
    runs-on: ubuntu-latest
    steps:
      - name: Branch protection guidance
        run: |
          echo "Configure branch protection for main:"
          echo "1) Require pull request before merging"
          echo "2) Require status checks to pass before merging"
          echo "3) Mark these checks as required: CI / quality, CI / security, CodeQL / Analyze, Visual Regression / chromatic"
          echo "4) Restrict force pushes"
          echo "5) Restrict deletions"
